name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    # Self-hosted macOS runner: the sources import Combine/OSLog, so the build
    # only works on Apple platforms. Swift 6.2 and swiftformat are expected to
    # be pre-installed on the runner.
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

      - name: Lint (SwiftFormat)
        run: swiftformat --lint .
